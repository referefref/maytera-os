; =============================================================================
; MayteraOS Theme: Retro UNIX (DEFAULT)
; Style: CDE/Motif/NeXTSTEP inspired
; Version: 1.1 - Updated with authentic CDE teal accent colors
; =============================================================================
;
; This is the DEFAULT theme for MayteraOS - the signature look that evokes
; the golden age of UNIX workstations from Sun, SGI, HP, DEC, and IBM.
;
; REFERENCE SYSTEMS:
; - CDE (Common Desktop Environment) - Solaris, HP-UX, AIX, Digital UNIX
; - Motif (OSF/Motif) - The X11 widget toolkit standard
; - NeXTSTEP - Steve Jobs' elegant UNIX desktop
; - SGI IRIX "Indigo Magic" - Silicon Graphics workstations
; - Sun OpenWindows - Sun Microsystems' desktop environment
;
; =============================================================================

[theme]
name = "Retro UNIX"
version = 1.1
author = "MayteraOS Team"
description = "Classic 1990s UNIX workstation aesthetic - CDE, Motif, NeXTSTEP inspired"
style = retro
default = true

; =============================================================================
; COLOR DEFINITIONS
; All colors in 0xRRGGBB format (no alpha)
; =============================================================================

[colors]
; -----------------------------------------------------------------------------
; Window Titlebar Colors (CDE-inspired deep teal)
; -----------------------------------------------------------------------------
titlebar_active = 0x336666
titlebar_inactive = 0x808080
titlebar_text = 0xFFFFFF
titlebar_text_inactive = 0xD0D0D0

; -----------------------------------------------------------------------------
; Window Body Colors (Classic Motif warm gray)
; The iconic #B4B4B4 that defined UNIX workstations
; -----------------------------------------------------------------------------
window_bg = 0xB4B4B4
window_border = 0x404040
window_content_bg = 0xB4B4B4

; -----------------------------------------------------------------------------
; 3D Beveled Border Colors (Authentic Motif style)
; RAISED: light top-left, dark bottom-right
; SUNKEN: dark top-left, light bottom-right
; -----------------------------------------------------------------------------
border_highlight = 0xFFFFFF
border_shadow = 0x808080
border_dark = 0x404040
border_outline = 0x000000

; -----------------------------------------------------------------------------
; Window Control Buttons (Motif square buttons, not round)
; -----------------------------------------------------------------------------
close_button = 0xC8C8C8
close_button_hover = 0xD8D8D8
close_button_pressed = 0xA8A8A8
minimize_button = 0xC8C8C8
minimize_button_hover = 0xD8D8D8
maximize_button = 0xC8C8C8
maximize_button_hover = 0xD8D8D8

; -----------------------------------------------------------------------------
; Button Widget Colors (Motif 3D beveled buttons)
; -----------------------------------------------------------------------------
button_bg = 0xC8C8C8
button_bg_hover = 0xD4D4D4
button_bg_pressed = 0xA8A8A8
button_border = 0x404040
button_highlight = 0xFFFFFF
button_shadow = 0x808080
button_text = 0x000000
button_disabled = 0x808080
button_disabled_bg = 0xB4B4B4

; -----------------------------------------------------------------------------
; Text Widget Colors (Sunken 3D text fields)
; -----------------------------------------------------------------------------
label_text = 0x000000
textbox_bg = 0xFFFFFF
textbox_border = 0x404040
textbox_text = 0x000000
textbox_cursor = 0x000000
textbox_selection_bg = 0x336666
textbox_selection_text = 0xFFFFFF

; -----------------------------------------------------------------------------
; Checkbox and Radio Button Colors
; -----------------------------------------------------------------------------
checkbox_bg = 0xFFFFFF
checkbox_border = 0x404040
checkbox_check = 0x000000
radio_bg = 0xFFFFFF
radio_border = 0x404040
radio_indicator = 0x000000

; -----------------------------------------------------------------------------
; Desktop Colors (CDE deep teal workspace)
; This iconic color evokes Sun and SGI workstations
; -----------------------------------------------------------------------------
desktop_bg = 0x336666

; -----------------------------------------------------------------------------
; Taskbar/Front Panel Colors (CDE-style raised gray panel)
; -----------------------------------------------------------------------------
taskbar_bg = 0xB4B4B4
taskbar_hover = 0xC8C8C8
taskbar_active = 0xA0A0A0
taskbar_text = 0x000000
taskbar_text_active = 0xFFFFFF
start_button = 0xC8C8C8
start_button_hover = 0xD4D4D4
gauge_bg = 0x606060
gauge_fg = 0x006666
gauge_border = 0x404040

; -----------------------------------------------------------------------------
; Menu Colors (Motif pulldown style)
; -----------------------------------------------------------------------------
menu_bg = 0xD4D4D4
menu_border = 0x404040
menu_item_hover = 0x336666
menu_text = 0x000000
menu_text_hover = 0xFFFFFF
menu_text_disabled = 0x808080
menu_separator = 0x808080
menu_highlight = 0xFFFFFF
menu_shadow = 0x404040

; -----------------------------------------------------------------------------
; Scrollbar Colors (Motif with arrows and raised thumb)
; -----------------------------------------------------------------------------
scrollbar_bg = 0xB4B4B4
scrollbar_thumb = 0xC8C8C8
scrollbar_thumb_hover = 0xD4D4D4
scrollbar_thumb_pressed = 0xA8A8A8
scrollbar_arrow = 0x000000
scrollbar_arrow_bg = 0xC8C8C8

; -----------------------------------------------------------------------------
; Selection Colors (CDE teal accent)
; -----------------------------------------------------------------------------
selection_bg = 0x336666
selection_text = 0xFFFFFF

; -----------------------------------------------------------------------------
; Semantic/Status Colors
; -----------------------------------------------------------------------------
error = 0xCC0000
error_bg = 0xFFCCCC
warning = 0xC4A000
warning_bg = 0xFFF4CC
success = 0x4E9A06
success_bg = 0xCCFFCC
info = 0x336666
info_bg = 0xCCDDDD

; -----------------------------------------------------------------------------
; Focus Indicator (classic X11 dotted rectangle)
; -----------------------------------------------------------------------------
focus_outline = 0x000000
focus_style = dotted

; =============================================================================
; DIMENSION SPECIFICATIONS
; All values in pixels
; =============================================================================

[dimensions]
; Window chrome
titlebar_height = 20
border_width = 2
corner_radius = 0
resize_grip_size = 10
window_min_width = 100
window_min_height = 50

; Buttons
button_height = 24
button_min_width = 75
button_padding_h = 8
button_padding_v = 4

; Title bar buttons
titlebar_button_size = 16
titlebar_button_spacing = 2

; Input fields
input_height = 22
input_padding = 4

; Checkboxes and radio buttons
checkbox_size = 13
radio_size = 13
checkbox_label_spacing = 4

; Scrollbars
scrollbar_width = 16
scrollbar_arrow_size = 16
scrollbar_thumb_min_size = 20

; Menus
menu_item_height = 20
menu_item_padding_h = 8
menu_separator_margin = 4
menu_border_width = 2

; Icons
icon_size_small = 16
icon_size_standard = 32
icon_size_large = 48
desktop_icon_spacing = 16
desktop_grid_size = 80

; =============================================================================
; TYPOGRAPHY
; =============================================================================

[typography]
font_family = "Terminus", "Fixed", "DejaVu Sans Mono", monospace
font_size = 12
font_weight = 400
line_height = 16

titlebar_font_family = "Helvetica", "Liberation Sans", sans-serif
titlebar_font_size = 12
titlebar_font_weight = 600

monospace_font = "Terminus", "Fixed", "DejaVu Sans Mono", monospace
monospace_size = 12

; Font rendering
antialiasing = none
hinting = full

; =============================================================================
; EFFECTS AND ANIMATIONS
; =============================================================================

[effects]
; 0 = disabled, 1 = enabled
animations = 0
shadows = 0
transparency = 0
blur = 0

; Animation timing (milliseconds) - not used when animations = 0
animation_duration_fast = 0
animation_duration_normal = 0
animation_duration_slow = 0

; =============================================================================
; BORDER STYLES
; =============================================================================

[borders]
; Style options: flat, 3d-raised, 3d-sunken, outline
button_style = 3d-raised
button_pressed_style = 3d-sunken
input_style = 3d-sunken
window_style = 3d-raised
menu_style = 3d-raised
scrollbar_trough_style = 3d-sunken
scrollbar_thumb_style = 3d-raised

; =============================================================================
; WINDOW BUTTON LAYOUT
; =============================================================================

[window_buttons]
; Position: left, right
position = right
; Order of buttons (left to right or right to left depending on position)
; Available: minimize, maximize, close
order = minimize, maximize, close
; Button style: icon, glyph
style = glyph

; =============================================================================
; CURSORS
; =============================================================================

[cursors]
default = arrow
pointer = hand
text = ibeam
resize_ns = size_ns
resize_ew = size_ew
resize_nwse = size_nwse
resize_nesw = size_nesw
move = move
wait = wait

; =============================================================================
; SOUNDS (optional)
; =============================================================================

[sounds]
enabled = 0
; startup = startup.wav
; shutdown = shutdown.wav
; error = error.wav
; notification = notify.wav
