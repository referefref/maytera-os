# MayteraOS login configuration.
#
# autologin=<username> signs that user in automatically and goes straight to
# the desktop. Without this file the kernel still boots normally, but it stops
# at the "Select User" screen and waits for someone to pick an account, so an
# unattended boot (a VM, a live ISO, a CI run) looks like it has hung at a
# static screen with the compositor never starting.
#
# The default accounts are root (password root) and admin (password admin),
# created on first boot when no user database exists yet. Change the password
# or remove this file if you want the login prompt back.
autologin=root
