# STARTMENU.CFG - MayteraOS Start Menu Configuration
#
# Display settings
HEIGHT=450
VIEW=1
SORT=0
RECENT=1
SEARCH=1
#
# Menu entries
# Format: CATEGORY=CategoryName
#         APP=DisplayName,icon_name,launch_command
#         SEPARATOR
#
# launch_command can be:
#   /apps/name       - Launch userspace ELF from disk
#   kernel:name      - Launch kernel built-in app
#   wallpicker       - Open wallpaper picker
#
# Available icon names:
#   terminal, network, folder, highlight, calculator, paint, image,
#   music, play, clock, cog, game_doom, game_solitaire, game_pong,
#   game_lemmings, game, power, refresh, trash, log, task_manager,
#   palette, categories, home, info, window, file

CATEGORY=Applications
APP=Terminal,terminal,/apps/terminal
APP=Browser,network,kernel:browser
APP=Files,folder,/apps/files
APP=Editor,highlight,kernel:editor
APP=Calculator,calculator,/apps/calc
APP=Paint,paint,/apps/paint
APP=Image Viewer,image,/apps/imageviewer
APP=Audio Player,music,kernel:audio
APP=Media Player,play,kernel:media
APP=Clock,clock,/apps/clock
APP=IRC,network,kernel:irc

CATEGORY=Games
APP=DOOM,game_doom,kernel:doom
APP=Lemmings,game_lemmings,kernel:lemmings
APP=Solitaire,game_solitaire,kernel:solitaire
APP=Pong,game_pong,kernel:pong
APP=NetHack,game,kernel:nethack

CATEGORY=System
APP=Settings,cog,kernel:settings
APP=Network,network,kernel:netsettings
APP=Task Manager,task_manager,kernel:taskmanager
APP=Recycle Bin,trash,/apps/recyclebin
APP=System Log,log,/apps/syslog
APP=Wallpaper,palette,wallpicker

SEPARATOR

CATEGORY=Power
APP=Restart,refresh,kernel:restart
APP=Shutdown,power,kernel:shutdown
