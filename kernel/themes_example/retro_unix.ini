# MayteraOS Theme Definition File
# Retro UNIX (CDE/Motif-inspired) Theme
# The signature MayteraOS look - nostalgic 1990s UNIX workstation aesthetic

[theme]
name=Retro UNIX
author=MayteraOS Team
version=1.0

[colors]
# General colors
background=#B4B4B4
foreground=#000000
accent=#336666
selection=#336666
selection_text=#FFFFFF

# Window titlebar - CDE-style deep teal for active, gray for inactive
titlebar_active=#336666
titlebar_inactive=#808080
titlebar_text=#FFFFFF

# Window body - Classic warm gray Motif background
window_bg=#B4B4B4
window_border=#404040

# Window control buttons
close_button=#C8C8C8
close_button_hover=#D8D8D8
minimize_button=#C8C8C8
maximize_button=#C8C8C8

# Button widget colors (3D beveled Motif style)
button_face=#C8C8C8
button_light=#FFFFFF
button_shadow=#808080
button_dark=#404040
button_text=#000000
button_disabled=#808080

# Text widget colors
label_text=#000000
textbox_bg=#FFFFFF
textbox_border=#404040
textbox_text=#000000
textbox_cursor=#000000

# Checkbox colors
checkbox_bg=#FFFFFF
checkbox_border=#404040
checkbox_check=#000000

# Desktop - CDE-inspired deep teal
desktop_bg=#336666

# Taskbar colors
taskbar_bg=#B4B4B4
taskbar_hover=#C8C8C8
taskbar_active=#A0A0A0
start_button=#C8C8C8
gauge_bg=#606060
gauge_fg=#006666

# Menu colors
menu_bg=#D4D4D4
menu_border=#404040
menu_item_hover=#336666
menu_text=#000000
menu_text_disabled=#808080
menu_separator=#808080

# Scrollbar colors
scrollbar_bg=#B4B4B4
scrollbar_thumb=#C8C8C8
scrollbar_thumb_hover=#D4D4D4

# Tab colors
tab_bg=#B4B4B4
tab_active=#FFFFFF
tab_border=#808080

# Tooltip colors
tooltip_bg=#FFFFC0
tooltip_border=#000000
tooltip_text=#000000

# Progress bar colors
progress_bg=#B4B4B4
progress_fg=#336666

[fonts]
# Font format: name,size[,bold][,italic]
system=fixed,12
title=fixed,12,bold
menu=fixed,11
monospace=fixed,10
small=fixed,10
large=fixed,14,bold

[metrics]
border_width=2
titlebar_height=18
button_width=16
button_height=14
scrollbar_width=16
menu_item_height=20
icon_size=32
corner_radius=0
padding=4
spacing=4
tab_height=24

[decorations]
# Style options: flat, motif, win95, win11, mac, gtk
style=motif
corner_radius=0
shadow_enabled=false
