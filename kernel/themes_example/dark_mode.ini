# MayteraOS Theme Definition File
# Dark Mode Theme

[theme]
name=Dark Mode
author=MayteraOS Team
version=1.0

[colors]
# General colors
background=#2D2D2D
foreground=#E0E0E0
accent=#405080
selection=#405080
selection_text=#FFFFFF

# Window titlebar
titlebar_active=#202020
titlebar_inactive=#181818
titlebar_text=#E0E0E0

# Window body
window_bg=#2D2D2D
window_border=#404040

# Window control buttons
close_button=#404040
close_button_hover=#C03030
minimize_button=#505050
maximize_button=#505050

# Button widget colors
button_face=#404040
button_light=#505050
button_shadow=#303030
button_dark=#606060
button_text=#E0E0E0
button_disabled=#606060

# Text widget colors
label_text=#E0E0E0
textbox_bg=#383838
textbox_border=#606060
textbox_text=#E0E0E0
textbox_cursor=#FFFFFF

# Checkbox colors
checkbox_bg=#383838
checkbox_border=#606060
checkbox_check=#80C0FF

# Desktop
desktop_bg=#101820

# Taskbar colors
taskbar_bg=#181818
taskbar_hover=#282828
taskbar_active=#383838
start_button=#282828
gauge_bg=#101010
gauge_fg=#606060

# Menu colors
menu_bg=#2D2D2D
menu_border=#505050
menu_item_hover=#405080
menu_text=#E0E0E0
menu_text_disabled=#606060
menu_separator=#404040

# Scrollbar colors
scrollbar_bg=#303030
scrollbar_thumb=#505050
scrollbar_thumb_hover=#606060

# Tab colors
tab_bg=#2D2D2D
tab_active=#404040
tab_border=#505050

# Tooltip colors
tooltip_bg=#404040
tooltip_border=#606060
tooltip_text=#FFFFFF

# Progress bar colors
progress_bg=#303030
progress_fg=#405080

[fonts]
system=fixed,12
title=fixed,12,bold
menu=fixed,11
monospace=fixed,10
small=fixed,10
large=fixed,14,bold

[metrics]
border_width=1
titlebar_height=20
button_width=16
button_height=14
scrollbar_width=16
menu_item_height=20
icon_size=32
corner_radius=0
padding=4
spacing=4
tab_height=24

[decorations]
style=flat
corner_radius=0
shadow_enabled=false
